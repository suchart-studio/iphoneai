<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Management Dashboard (1920x1080 Desktop)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-dark: #09090b;
            --panel-bg: #141416;
            --card-bg: #1f1f23;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --primary: #007aff;
            --danger: #ff453a;
            --warning: #ff9f0a;
            --success: #30d158;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 1920px;
            height: 1080px;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        /* --- 🔒 หน้าจอระบบความปลอดภัย Login --- */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .login-box {
            background: var(--panel-bg);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #27272a;
            text-align: center;
            width: 400px;
        }

        .login-box h2 {
            font-size: 24px;
            margin-bottom: 25px;
        }

        .login-box input {
            width: 100%;
            font-size: 24px;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #3f3f46;
            background: var(--card-bg);
            color: white;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 4px;
        }

        .login-box button {
            width: 100%;
            font-size: 18px;
            padding: 14px;
            border-radius: 10px;
            background: var(--primary);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        /* --- 🖥️ โครงสร้าง Dashboard (1920x1080 Desktop Layout) --- */
        #app-container {
            display: none;
            width: 100%;
            height: 100%;
            display: flex;
        }

        .control-sidebar {
            width: 480px;
            height: 100%;
            background-color: var(--panel-bg);
            border-right: 1px solid #27272a;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 10;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }

        .map-dashboard-main {
            flex: 1;
            height: 100%;
            position: relative;
            background: #111;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .camera-wrapper {
            width: 100%;
            height: 250px;
            position: relative;
            background: #000;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid #3f3f46;
        }

        #webcam, #ai-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }

        .timer-panel {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 16px;
            text-align: center;
            border: 1px solid #27272a;
            margin: 15px 0;
        }

        .timer-title {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .countdown-clock {
            font-size: 48px;
            font-weight: 800;
            color: var(--warning);
            font-family: monospace;
            margin-top: 5px;
        }

        .counter-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 15px;
        }

        .counter-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255,255,255,0.02);
        }

        .counter-icon { font-size: 26px; }
        .counter-info { display: flex; flex-direction: column; }
        .counter-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; }
        .counter-value { font-size: 28px; font-weight: 700; font-family: monospace; }

        .control-btn {
            width: 100%;
            padding: 20px;
            font-size: 18px;
            font-weight: 700;
            border: none;
            border-radius: 14px;
            color: white;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }
        .btn-ready { background: var(--primary); }
        .btn-active { background: var(--danger); animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.8; }
            100% { opacity: 1; }
        }

        .custom-map-label {
            background: rgba(255, 69, 58, 0.95) !important;
            border: 1px solid #fff !important;
            color: #fff !important;
            font-weight: bold !important;
            font-size: 13px !important;
            border-radius: 6px !important;
            padding: 3px 8px !important;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>⚙️ Traffic Console Terminal Login</h2>
            <input type="password" id="password-input" placeholder="••••••" autofocus inputmode="numeric">
            <button onclick="verifyPassword()">UNLOCK TERMINAL</button>
        </div>
    </div>

    <div id="app-container">
        
        <div class="control-sidebar">
            <div>
                <h1 style="font-size: 20px; font-weight: 700; margin-bottom: 4px;">TRAFFIC NODE MONITOR</h1>
                <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 20px;">สถิติการตรวจนับความหนาแน่นวัตถุรายนาที</p>

                <div class="camera-wrapper">
                    <video id="webcam" autoplay playsinline muted></video>
                    <canvas id="ai-overlay"></canvas>
                </div>

                <div class="timer-panel">
                    <div class="timer-title" id="timer-status">SESSION TIME REMAINING</div>
                    <div id="countdown-display" class="countdown-clock">01:00</div>
                </div>

                <div class="counter-grid">
                    <div class="counter-card">
                        <span class="counter-icon">👤</span>
                        <div class="counter-info"><span class="counter-label">People</span><span class="counter-value" id="total-person">0</span></div>
                    </div>
                    <div class="counter-card">
                        <span class="counter-icon">🚗</span>
                        <div class="counter-info"><span class="counter-label">Cars</span><span class="counter-value" id="total-car">0</span></div>
                    </div>
                    <div class="counter-card">
                        <span class="counter-icon">🏍️</span>
                        <div class="counter-info"><span class="counter-label">Motorcycles</span><span class="counter-value" id="total-motorcycle">0</span></div>
                    </div>
                    <div class="counter-card">
                        <span class="counter-icon">🚛</span>
                        <div class="counter-info"><span class="counter-label">Trucks</span><span class="counter-value" id="total-truck">0</span></div>
                    </div>
                    <div class="counter-card">
                        <span class="counter-icon">🚌</span>
                        <div class="counter-info"><span class="counter-label">Buses</span><span class="counter-value" id="total-bus">0</span></div>
                    </div>
                    <div class="counter-card">
                        <span class="counter-icon">🚲</span>
                        <div class="counter-info"><span class="counter-label">Bicycles</span><span class="counter-value" id="total-bicycle">0</span></div>
                    </div>
                </div>
            </div>

            <div>
                <button id="master-btn" class="control-btn btn-ready" disabled onclick="startTrackingSession()">LOADING AI MODEL...</button>
            </div>
        </div>

        <div class="map-dashboard-main">
            <div id="map"></div>
        </div>

    </div>

    <script>
        // --- 🔑 คอนฟิก Firebase ที่ใช้งานจริงของคุณ ---
        const firebaseConfig = {
          apiKey: "AIzaSyDMMwciq6QoLSaWK6xfdr0U3ynyahtoaSk",
          authDomain: "studio-a33fe.firebaseapp.com",
          databaseURL: "https://studio-a33fe-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "studio-a33fe",
          storageBucket: "studio-a33fe.firebasestorage.app",
          messagingSenderId: "753539109404",
          appId: "1:753539109404:web:e3ea4214849d4bd7e645d9",
          measurementId: "G-P7Q5TTLS5Y"
        };
        
        // เริ่มต้นการทำงาน Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const classMapping = {
            'person': { name: 'คน' }, 'car': { name: 'รถยนต์' }, 'motorcycle': { name: 'รถมอเตอร์ไซค์' },
            'truck': { name: 'รถบรรทุก' }, 'bus': { name: 'รถบัส' }, 'bicycle': { name: 'รถจักรยาน' }
        };
        const targetClasses = Object.keys(classMapping);

        let model = null;
        let isTracking = false;
        let countdownTimer = null;
        let timeLeft = 60; 
        let currentLatitude = 13.7563;  
        let currentLongitude = 100.5018; 
        let map = null;
        let mapMarkersLayers = [];

        let cumulativeCounts = {};
        targetClasses.forEach(c => cumulativeCounts[c] = 0);

        let trackedObjects = []; 
        let nextObjectId = 0;
        const DISTANCE_THRESHOLD = 90; 
        const TRACK_MAX_AGE = 1200;    

        function verifyPassword() {
            if(document.getElementById('password-input').value === "878556") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
                initDashboardSystem();
            } else {
                alert("รหัสผ่านไม่ถูกต้อง");
            }
        }

        function initMap() {
            map = L.map('map', { zoomControl: true }).setView([currentLatitude, currentLongitude], 13);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(position => {
                    currentLatitude = position.coords.latitude;
                    currentLongitude = position.coords.longitude;
                    map.setView([currentLatitude, currentLongitude], 15);
                }, () => { console.log("กรุณาเปิด GPS เพื่อให้หมุดปักตรงตำแหน่งจริง"); });
            }
        }

        async function initDashboardSystem() {
            initMap();
            loadMarkersFromFirebase(); 

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 1280, height: 720, facingMode: "environment" }, audio: false
                });
                document.getElementById('webcam').srcObject = stream;
                model = await cocoSsd.load();
                
                const btn = document.getElementById('master-btn');
                btn.innerText = "START 1-MIN SESSION";
                btn.disabled = false;
                
                runPredictionEngine();
            } catch (err) {
                alert("ไม่สามารถเข้าถึงกล้องเว็บแคมได้");
            }
        }

        function startTrackingSession() {
            if(isTracking) return;

            isTracking = true;
            timeLeft = 60; 
            trackedObjects = [];
            
            targetClasses.forEach(c => {
                cumulativeCounts[c] = 0;
                document.getElementById(`total-${c}`).innerText = "0";
            });

            const btn = document.getElementById('master-btn');
            btn.innerText = "PROCESSING TRAFFIC DATA...";
            btn.className = "control-btn btn-active";
            document.getElementById('timer-status').innerText = "RECORDING LIVE NODES...";

            countdownTimer = setInterval(() => {
                timeLeft--;
                let mins = String(Math.floor(timeLeft / 60)).padStart(2, '0');
                let secs = String(timeLeft % 60).padStart(2, '0');
                document.getElementById('countdown-display').innerText = `${mins}:${secs}`;

                if(timeLeft <= 0) {
                    stopAndUploadSession();
                }
            }, 1000);
        }

        function stopAndUploadSession() {
            isTracking = false;
            clearInterval(countdownTimer);
            document.getElementById('countdown-display').innerText = "01:00";
            
            const btn = document.getElementById('master-btn');
            btn.innerText = "START 1-MIN SESSION";
            btn.className = "control-btn btn-ready";
            document.getElementById('timer-status').innerText = "SESSION COMPLETED";

            let totalVehicles1Min = cumulativeCounts['car'] + cumulativeCounts['motorcycle'] + 
                                    cumulativeCounts['truck'] + cumulativeCounts['bus'] + cumulativeCounts['bicycle'];

            //คำนวณประมาณการรายชั่วโมง (ยอดรวม 1 นาที * 60)
            let estimatedHourlyTraffic = totalVehicles1Min * 60;

            const sessionPayload = {
                latitude: currentLatitude,
                longitude: currentLongitude,
                timestamp: Date.now(),
                counts: cumulativeCounts,
                total_vehicles_1min: totalVehicles1Min,
                hourly_estimate: estimatedHourlyTraffic
            };

            // ส่งข้อมูลไปเก็บบน Firebase Realtime Database
            database.ref('traffic_sessions').push(sessionPayload)
                .then(() => {
                    console.log("บันทึกข้อมูลและส่งค่าไปยัง Firebase สำเร็จ!");
                    loadMarkersFromFirebase(); 
                })
                .catch(error => alert("Firebase Error: " + error.message));
        }

        function loadMarkersFromFirebase() {
            database.ref('traffic_sessions').once('value', (snapshot) => {
                mapMarkersLayers.forEach(layer => map.removeLayer(layer));
                mapMarkersLayers = [];

                snapshot.forEach((childSnapshot) => {
                    const data = childSnapshot.val();
                    if(data.latitude && data.longitude) {
                        
                        let circleRadius = Math.max(40, data.hourly_estimate * 0.2);

                        let trafficCircle = L.circle([data.latitude, data.longitude], {
                            color: '#ff453a',
                            fillColor: '#ff453a',
                            fillOpacity: 0.4,
                            radius: circleRadius
                        }).addTo(map);

                        let labelText = `📊 ประมาณการ: ${data.hourly_estimate} คัน/ชม.`;
                        trafficCircle.bindTooltip(labelText, {
                            permanent: true,
                            direction: 'center',
                            className: 'custom-map-label'
                        });

                        let popupDetail = `
                            <div style="font-family: sans-serif; color: #111; min-width: 180px;">
                                <b style="font-size: 14px; display:block; margin-bottom: 5px;">📍 จุดตรวจวัดการจราจร</b>
                                <hr style="margin: 4px 0; border:0; border-top:1px solid #ccc;">
                                <b>🚗 ประมาณการรายชั่วโมง:</b> <span style="color:red; font-size:14px;">${data.hourly_estimate} คัน</span><br>
                                ⏱️ ยอดนับจริง (1 นาที): ${data.total_vehicles_1min} คัน<br>
                                👤 คนเดินเท้า: ${data.counts.person || 0} คน<br>
                                <small style="color:gray;">เวลา: ${new Date(data.timestamp).toLocaleString('th-TH')}</small>
                            </div>
                        `;
                        trafficCircle.bindPopup(popupDetail);
                        mapMarkersLayers.push(trafficCircle);
                    }
                });
            });
        }

        async function runPredictionEngine() {
            const video = document.getElementById('webcam');
            const canvas = document.getElementById('ai-overlay');
            const ctx = canvas.getContext('2d');

            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
                const predictions = await model.detect(video);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                let currentFrameDetections = [];

                predictions.forEach(p => {
                    if (targetClasses.includes(p.class) && p.score > 0.45) {
                        const [x, y, w, h] = p.bbox;
                        const cx = x + w / 2;
                        const cy = y + h / 2;
                        
                        currentFrameDetections.push({ class: p.class, cx: cx, cy: cy, bbox: p.bbox });

                        ctx.strokeStyle = "#007aff";
                        ctx.lineWidth = 4;
                        ctx.strokeRect(x, y, w, h);
                    }
                });

                if(isTracking) {
                    let now = Date.now();

                    currentFrameDetections.forEach(det => {
                        let matchedTrack = null;
                        let bestDist = DISTANCE_THRESHOLD;

                        trackedObjects.forEach(track => {
                            if(track.class === det.class) {
                                let dist = Math.hypot(det.cx - track.cx, det.cy - track.cy);
                                if(dist < bestDist) {
                                    bestDist = dist;
                                    matchedTrack = track;
                                }
                            }
                        });

                        if (matchedTrack) {
                            matchedTrack.cx = det.cx;
                            matchedTrack.cy = det.cy;
                            matchedTrack.lastSeen = now;
                        } else {
                            cumulativeCounts[det.class]++;
                            document.getElementById(`total-${det.class}`).innerText = cumulativeCounts[det.class];
                            
                            trackedObjects.push({
                                id: nextObjectId++, class: det.class, cx: det.cx, cy: det.cy, lastSeen: now
                            });
                        }
                    });

                    trackedObjects = trackedObjects.filter(t => (now - t.lastSeen) < TRACK_MAX_AGE);
                }
            }
            requestAnimationFrame(runPredictionEngine);
        }
    </script>
</body>
</html>
