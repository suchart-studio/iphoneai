<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Admin Console (Responsive)</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #09090b; --panel: #141416; --card: #1f1f23; --primary: #0a84ff; --danger: #ff453a; --text: #f4f4f5; --text-muted: #a1a1aa; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; padding: 20px; }
        
        /* สไตล์หน้า Lock รหัสผ่าน */
        #lock-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 999; }
        .lock-box { background: var(--panel); padding: 30px; border-radius: 16px; text-align: center; width: 90%; max-width: 360px; border: 1px solid #27272a; }
        .lock-box input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid #3f3f46; background: var(--card); color: #fff; text-align: center; font-size: 20px; letter-spacing: 4px; }
        .lock-box button { width: 100%; padding: 12px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .header { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .header h1 { font-size: 24px; }
        
        /* สไตล์ตาราง (สำหรับจอคอมพิวเตอร์) */
        .table-container { background: var(--panel); border-radius: 12px; border: 1px solid #27272a; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        th, td { padding: 14px; border-bottom: 1px solid #27272a; }
        th { background: #1c1c1e; color: var(--text-muted); font-weight: 600; }
        
        .input-edit { background: var(--card); color: #fff; border: 1px solid #3f3f46; padding: 6px 10px; border-radius: 6px; width: 90px; text-align: center; font-family: monospace; }
        .btn { padding: 6px 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 12px; margin-right: 5px; }
        .btn-save { background: var(--primary); color: white; }
        .btn-del { background: var(--danger); color: white; }

        /* สไตล์การ์ดเปิดโหมดมือถือ (Mobile Responsive) */
        @media (max-width: 768px) {
            table, thead, tbody, th, td, tr { display: block; }
            thead { display: none; }
            tr { background: var(--panel); margin-bottom: 15px; border-radius: 12px; border: 1px solid #27272a; padding: 10px; }
            td { text-align: right; padding: 8px 10px; border-bottom: 1px dashed #27272a; position: relative; display: flex; justify-content: space-between; align-items: center; }
            td::before { content: attr(data-label); font-weight: bold; color: var(--text-muted); float: left; }
            .input-edit { width: 120px; }
        }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="lock-box">
            <h2>🔑 Admin Dashboard</h2>
            <input type="password" id="pass" placeholder="••••••" inputmode="numeric">
            <button onclick="checkPass()">UNLOCK</button>
        </div>
    </div>

    <div id="main-content" style="display:none;">
        <div class="header">
            <div>
                <h1>⚙️ ระบบจัดการข้อมูลจราจร</h1>
                <p style="color:var(--text-muted); font-size:13px;">สำหรับแก้ไขตัวเลขประมาณการ หรือลบพิกัดที่ผิดพลาด</p>
            </div>
            <button onclick="location.reload()" style="padding:8px 16px; background:#27272a; color:white; border:none; border-radius:8px; cursor:pointer;">🔒 ออกจากระบบ</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>วัน-เวลา</th>
                        <th>พิกัด (Lat, Lng)</th>
                        <th>นับจริง (1 นาที)</th>
                        <th>ประมาณการ (คัน/ชม.)</th>
                        <th>การจัดการ</th>
                    </tr>
                </thead>
                <tbody id="data-list">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyDMMwciq6QoLSaWK6xfdr0U3ynyahtoaSk",
          authDomain: "studio-a33fe.firebaseapp.com",
          databaseURL: "https://studio-a33fe-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "studio-a33fe",
          storageBucket: "studio-a33fe.firebasestorage.app",
          messagingSenderId: "753539109404",
          appId: "1:753539109404:web:e3ea4214849d4bd7e645d9",
          measurementId: "G-P7Q5TTLS5Y"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function checkPass() {
            if(document.getElementById('pass').value === "878556") {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                loadAdminData();
            } else { alert("รหัสผ่านไม่ถูกต้อง"); }
        }

        function loadAdminData() {
            database.ref('traffic_sessions').on('value', (snapshot) => {
                const tbody = document.getElementById('data-list');
                tbody.innerHTML = "";
                
                let hasData = false;
                snapshot.forEach((childSnapshot) => {
                    hasData = true;
                    const key = childSnapshot.key;
                    const data = childSnapshot.val();

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td data-label="วัน-เวลา">${new Date(data.timestamp).toLocaleString('th-TH',{dateStyle:'short',timeStyle:'short'})}</td>
                        <td data-label="พิกัด">${data.latitude.toFixed(4)}, ${data.longitude.toFixed(4)}</td>
                        <td data-label="นับจริง">${data.total_vehicles_1min} คัน</td>
                        <td data-label="ประมาณการ (แก้ไขได้)">
                            <input type="number" class="input-edit" id="est-${key}" value="${data.hourly_estimate}">
                        </td>
                        <td data-label="การจัดการ">
                            <button class="btn btn-save" onclick="updateSession('${key}')">บันทึก</button>
                            <button class="btn btn-del" onclick="deleteSession('${key}')">ลบ</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
                if(!hasData) { tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:var(--text-muted);">ไม่มีข้อมูลในระบบ</td></tr>`; }
            });
        }

        function updateSession(key) {
            const newVal = parseInt(document.getElementById(`est-${key}`).value);
            if(isNaN(newVal)) return alert("กรุณากรอกตัวเลขที่ถูกต้อง");
            
            database.ref('traffic_sessions').child(key).update({ hourly_estimate: newVal })
                .then(() => alert("อัปเดตข้อมูลประมาณการรายชั่วโมงเรียบร้อย!"))
                .catch(err => alert("ข้อผิดพลาด: " + err.message));
        }

        function deleteSession(key) {
            if(confirm("⚠️ ยืนยันการลบจุดตรวจวัดนี้ออกจากฐานข้อมูล? การลบนี้จะมีผลทันทีบนหน้าแผนที่หลัก")) {
                database.ref('traffic_sessions').child(key).remove()
                    .catch(err => alert("ข้อผิดพลาด: " + err.message));
            }
        }
    </script>
</body>
</html>
